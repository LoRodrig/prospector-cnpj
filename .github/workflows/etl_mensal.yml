name: ETL Mensal — Receita Federal

# Roda automaticamente no dia 15 de cada mês às 03:00 UTC
# (os dados da Receita costumam ser publicados na 1ª semana do mês)
on:
  schedule:
    - cron: "0 3 15 * *"

  # Permite rodar manualmente pelo botão "Run workflow" na aba Actions
  workflow_dispatch:
    inputs:
      limite:
        description: "Limite de registros a processar (0 = sem limite)"
        required: false
        default: "0"
      sem_download:
        description: "Pular download dos ZIPs (usar arquivos já existentes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  PYTHON_VERSION: "3.11"

jobs:
  etl:
    name: Extração e carga de dados CNPJ
    runs-on: ubuntu-latest
    timeout-minutes: 360      # ZIPs da Receita somam ~7 GB; dê margem

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────
      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── 3. Dependências ───────────────────────────────────────────
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt

      # ── 4. Criar .env a partir dos Secrets do repositório ─────────
      # Configure os secrets em:
      #   Settings → Secrets and variables → Actions → New repository secret
      - name: Criar arquivo .env
        run: |
          cat > etl/.env << EOF
          SUPABASE_HOST=${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT=${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB=${{ secrets.SUPABASE_DB }}
          SUPABASE_USER=${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD=${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_PROJECT_REF=${{ secrets.SUPABASE_PROJECT_REF }}
          NOMINATIM_EMAIL=${{ secrets.NOMINATIM_EMAIL }}
          EOF

      # ── 5. ETL principal ─────────────────────────────────────────
      - name: Executar ETL (download + processamento + carga)
        working-directory: etl
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.sem_download }}" = "true" ]; then
            ARGS="$ARGS --sem-download"
          fi
          python cnpjs_receita.py $ARGS

      # ── 6. Geocodificação ─────────────────────────────────────────
      - name: Geocodificar endereços pendentes
        working-directory: etl
        run: |
          LIMITE="${{ github.event.inputs.limite || '0' }}"
          python geocodificar_supabase.py \
            --limite "$LIMITE" \
            --lote 100 \
            --delay 1.2 \
            --pausa-lote 5

      # ── 7. Limpar arquivos temporários ────────────────────────────
      - name: Remover ZIPs e .env após a execução
        if: always()
        run: |
          rm -rf etl/dados_receita/
          rm -f  etl/.env

      # ── 8. Notificação de falha (opcional) ───────────────────────
      # Descomente e configure SLACK_WEBHOOK_URL nos Secrets para receber alertas.
      # - name: Notificar falha no Slack
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1.26.0
      #   with:
      #     payload: |
      #       {"text": "❌ ETL Mensal CNPJ falhou! Verifique: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
